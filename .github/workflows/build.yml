name: Build (macOS + Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── macOS: DMG ──────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install flask pyinstaller pillow

      - name: Icon erstellen (PNG → ICNS)
        run: |
          mkdir -p /tmp/AppIcon.iconset
          for SIZE in 16 32 128 256 512; do
            sips -z $SIZE $SIZE static/logo.png \
              --out /tmp/AppIcon.iconset/icon_${SIZE}x${SIZE}.png
            sips -z $((SIZE*2)) $((SIZE*2)) static/logo.png \
              --out /tmp/AppIcon.iconset/icon_${SIZE}x${SIZE}@2x.png
          done
          iconutil -c icns /tmp/AppIcon.iconset -o /tmp/AppIcon.icns

      - name: PyInstaller-Build
        run: |
          pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name "Schiller-Klassen-Mixer" \
            --icon /tmp/AppIcon.icns \
            --add-data "static:static" \
            --add-data "app.py:." \
            --add-data "matcher.py:." \
            launcher.py

      - name: DMG erstellen
        run: |
          hdiutil create \
            -volname "Schiller-Klassen-Mixer" \
            -srcfolder "dist/Schiller-Klassen-Mixer.app" \
            -ov -format UDZO \
            "Schiller-Klassen-Mixer.dmg"

      - name: DMG hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Schiller-Klassen-Mixer-macOS
          path: Schiller-Klassen-Mixer.dmg
          retention-days: 30

  # ── Windows: Single-File EXE ────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install flask pyinstaller pillow

      - name: Icon erstellen (PNG → ICO)
        run: |
          python -c "
          from PIL import Image
          img = Image.open('static/logo.png')
          img.save('static/logo.ico', format='ICO',
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: PyInstaller-Build (Onefile, alles in einer EXE)
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "Schiller-Klassen-Mixer" `
            --icon "static\logo.ico" `
            --add-data "static;static" `
            --add-data "app.py;." `
            --add-data "matcher.py;." `
            launcher.py

      - name: EXE hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Schiller-Klassen-Mixer-Windows
          path: dist/Schiller-Klassen-Mixer.exe
          retention-days: 30
