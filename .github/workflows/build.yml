name: Build (macOS + Windows)

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

jobs:

  # ── macOS: DMG ──────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install flask pyinstaller pillow certifi

      - name: App-Version auslesen
        id: ver
        run: |
          V=$(python -c "import re; print(re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"', open('app.py').read()).group(1))")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "App-Version: $V"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_V="${GITHUB_REF_NAME#v}"
            if [ "$V" != "$TAG_V" ]; then
              echo "::error::APP_VERSION ($V) stimmt nicht mit dem Tag ($TAG_V) ueberein. Release abgebrochen, sonst zeigt version.json auf eine nicht hochgeladene Datei."
              exit 1
            fi
          fi

      - name: Icon erstellen (PNG → ICNS)
        run: |
          mkdir -p /tmp/AppIcon.iconset
          for SIZE in 16 32 128 256 512; do
            sips -z $SIZE $SIZE static/logo.png \
              --out /tmp/AppIcon.iconset/icon_${SIZE}x${SIZE}.png
            sips -z $((SIZE*2)) $((SIZE*2)) static/logo.png \
              --out /tmp/AppIcon.iconset/icon_${SIZE}x${SIZE}@2x.png
          done
          iconutil -c icns /tmp/AppIcon.iconset -o /tmp/AppIcon.icns

      - name: PyInstaller-Build
        run: |
          # App-Bundle-Name ist OHNE Versionsnummer, damit jede neue
          # Installation in /Applications die alte ueberschreibt und
          # nicht stapelweise alte Versionen liegen bleiben. Der
          # DMG-Dateiname auf Mittwald behaelt die Version (cacheable,
          # identifizierbar) — nur das App-Bundle innen ist versionslos.
          pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name "Schiller-Klassen-Mixer" \
            --icon /tmp/AppIcon.icns \
            --add-data "static:static" \
            --add-data "app.py:." \
            --add-data "matcher.py:." \
            --add-data "update.py:." \
            --collect-data certifi \
            launcher.py

      - name: DMG erstellen
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Staging-Ordner: App-Bundle (versionslos) + symbolischer Link
          # auf /Applications (in Finder als "Programme" sichtbar), damit
          # Nutzer:innen die App per Drag-and-Drop installieren koennen.
          rm -rf dmg-stage
          mkdir -p dmg-stage
          cp -R "dist/Schiller-Klassen-Mixer.app" dmg-stage/
          ln -s /Applications dmg-stage/Programme
          hdiutil create \
            -volname "Schiller-Klassen-Mixer v${VERSION}" \
            -srcfolder dmg-stage \
            -ov -format UDZO \
            "Schiller-Klassen-Mixer-v${VERSION}.dmg"

      - name: DMG hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Schiller-Klassen-Mixer-macOS-v${{ steps.ver.outputs.version }}
          path: Schiller-Klassen-Mixer-v${{ steps.ver.outputs.version }}.dmg
          retention-days: 90

  # ── Windows: Single-File EXE ────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install flask pyinstaller pillow certifi

      - name: App-Version auslesen
        id: ver
        shell: pwsh
        run: |
          $content = Get-Content app.py -Raw
          $m = [regex]::Match($content, 'APP_VERSION\s*=\s*"([^"]+)"')
          $v = $m.Groups[1].Value
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "App-Version: $v"
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $tagV = $env:GITHUB_REF_NAME -replace '^v',''
            if ($v -ne $tagV) {
              Write-Host "::error::APP_VERSION ($v) stimmt nicht mit dem Tag ($tagV) ueberein. Release abgebrochen."
              exit 1
            }
          }

      - name: Icon erstellen (PNG → ICO)
        run: |
          python -c "
          from PIL import Image
          img = Image.open('static/logo.png')
          img.save('static/logo.ico', format='ICO',
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: PyInstaller-Build (Onefile, alles in einer EXE)
        run: |
          # EXE-Name OHNE Versionsnummer, damit auto-update den eigenen
          # Speicherort sauber ueberschreibt und manuelle Re-Installs die
          # alte Datei nicht stapeln. Versionierter Dateiname kommt erst
          # beim Artifact-Upload + im Mittwald-URL.
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "Schiller-Klassen-Mixer" `
            --icon "static\logo.ico" `
            --add-data "static;static" `
            --add-data "app.py;." `
            --add-data "matcher.py;." `
            --add-data "update.py;." `
            --collect-data certifi `
            launcher.py

      - name: EXE versionieren fuer Artifact
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          Copy-Item "dist\Schiller-Klassen-Mixer.exe" "dist\Schiller-Klassen-Mixer-v$env:VERSION.exe"

      - name: EXE hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Schiller-Klassen-Mixer-Windows-v${{ steps.ver.outputs.version }}
          path: dist/Schiller-Klassen-Mixer-v${{ steps.ver.outputs.version }}.exe
          retention-days: 90

  # ── Publish: version.json + Binaries auf die Schul-Homepage (nur bei Tag) ──
  # Nur build-windows ist Pflicht — macOS-Runner stehen oft lange in der Queue
  # und sollen den Auto-Update-Deploy nicht aufhalten. Wenn DMG vorhanden ist
  # wird sie mit-hochgeladen, sonst bleibt der Mac-URL-Eintrag in version.json
  # auf einen kuenftigen Build verweisen.
  publish:
    # build-windows ist Pflicht (EXE muss da sein); build-macos wird abgewartet
    # damit die DMG nicht in einer Race-Condition fehlt — wenn macOS-Build
    # ausfaellt, laeuft publish trotzdem mit einer Warning weiter (DMG-Step
    # ist optional, siehe Upload-Logik unten).
    needs: [build-windows, build-macos]
    if: always() && needs.build-windows.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version aus Tag ableiten
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: version.json erzeugen
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # `www.`-Subdomain ist Pflicht: Mittwald macht sonst 301-Downgrade
          # von HTTPS apex auf HTTP www, was Python's urllib im
          # PyInstaller-Bundle nicht folgt -> Auto-Update findet "kein
          # Update". Browser-Pfade tolerieren den Redirect.
          # SHA-256 der Binaries ins Manifest schreiben -> der Client
          # (update.py) verifiziert den Hash vor dem EXE-Tausch.
          EXE=$(find artifacts -name '*.exe' | head -1)
          if [ -z "$EXE" ]; then echo "::error::EXE nicht in den Artefakten gefunden"; exit 1; fi
          WIN_SHA=$(sha256sum "$EXE" | cut -d' ' -f1)
          DMG=$(find artifacts -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then MAC_SHA=$(sha256sum "$DMG" | cut -d' ' -f1); else MAC_SHA=""; fi
          BASE="https://www.schiller-offenburg.de/classmatcher"
          if [ -n "$DMG" ]; then
            jq -n --arg version "$VERSION" \
                  --arg win_url "$BASE/Schiller-Klassen-Mixer-v${VERSION}.exe" \
                  --arg mac_url "$BASE/Schiller-Klassen-Mixer-v${VERSION}.dmg" \
                  --arg sha256 "$WIN_SHA" --arg mac_sha256 "$MAC_SHA" \
                  '{version:$version, win_url:$win_url, mac_url:$mac_url, sha256:$sha256, mac_sha256:$mac_sha256, notes:""}' > version.json
          else
            jq -n --arg version "$VERSION" \
                  --arg win_url "$BASE/Schiller-Klassen-Mixer-v${VERSION}.exe" \
                  --arg sha256 "$WIN_SHA" \
                  '{version:$version, win_url:$win_url, sha256:$sha256, notes:""}' > version.json
          fi
          cat version.json

      - name: Landing-Pages rendern (Version + Datum)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Die Installations-Anleitungen liegen als Templates in web/ mit
          # __VERSION__/__DATE__-Platzhaltern. Hier auf die Release-Version
          # gerendert, damit sie nie wieder gegenueber der App driften (frueher
          # manuell, deshalb standen sie laenger auf einer alten Version).
          DATE=$(python3 -c "import datetime; m=['','Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember']; d=datetime.date.today(); print(f'{d.day}. {m[d.month]} {d.year}')")
          for tpl in Mac-Installation Windows-Installation; do
            sed -e "s/__VERSION__/${VERSION}/g" -e "s/__DATE__/${DATE}/g" "web/${tpl}.html" > "${tpl}.html"
            echo "gerendert: ${tpl}.html (v${VERSION}, ${DATE})"
          done

      - name: Upload zur Homepage (Binaries zuerst, version.json zuletzt)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          EXE=$(find artifacts -name '*.exe' | head -1)
          DMG=$(find artifacts -name '*.dmg' | head -1)
          if [ -z "$EXE" ]; then
            echo "::error::EXE nicht in den Artefakten gefunden"; exit 1
          fi
          if [ -z "$DMG" ]; then
            echo "::warning::DMG fehlt — nur EXE + version.json werden hochgeladen"
          fi
          # Binaries zuerst, version.json zuletzt — Clients sehen nie eine
          # version.json, die auf noch-nicht-hochgeladene Dateien zeigt.
          UPLOAD_LIST=("$EXE")
          if [ -n "$DMG" ]; then
            UPLOAD_LIST+=("$DMG")
          fi
          # Anleitungen vor version.json: sie verweisen auf die schon
          # hochgeladenen Binaries; version.json bleibt das Letzte.
          UPLOAD_LIST+=("Mac-Installation.html" "Windows-Installation.html" "version.json")
          for f in "${UPLOAD_LIST[@]}"; do
            echo "Lade hoch: $f"
            curl --fail --silent --show-error --ftp-create-dirs \
                 --user "$FTP_USER:$FTP_PASS" \
                 --upload-file "$f" \
                 "ftp://$FTP_HOST/html/classmatcher/$(basename "$f")"
          done
          echo "Publish fertig: version.json $(grep -o '\"version\"[^,]*' version.json)"

      - name: Post-Publish-Smoke-Check
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          BASE="https://www.schiller-offenburg.de/classmatcher"
          sleep 5  # kurze FTP-Sichtbarkeits-Pause
          M=$(curl -fsS -m 20 "$BASE/version.json")
          echo "$M"
          LV=$(echo "$M" | python3 -c "import sys,json;print(json.load(sys.stdin)['version'])")
          if [ "$LV" != "$VERSION" ]; then echo "::error::Live version.json=$LV, erwartet $VERSION"; exit 1; fi
          WU=$(echo "$M" | python3 -c "import sys,json;print(json.load(sys.stdin)['win_url'])")
          curl -fsS -m 90 -o /dev/null "$WU" || { echo "::error::win_url nicht abrufbar: $WU"; exit 1; }
          MU=$(echo "$M" | python3 -c "import sys,json;print(json.load(sys.stdin).get('mac_url',''))")
          if [ -n "$MU" ]; then curl -fsS -m 90 -o /dev/null "$MU" || { echo "::error::mac_url nicht abrufbar: $MU"; exit 1; }; fi
          echo "Smoke-Check OK: live version=$VERSION, Binaries abrufbar."
