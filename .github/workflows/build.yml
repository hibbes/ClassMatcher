name: Build (macOS + Windows)

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

jobs:

  # ── macOS: DMG ──────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install flask pyinstaller pillow certifi

      - name: App-Version auslesen
        id: ver
        run: |
          V=$(python -c "import re; print(re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"', open('app.py').read()).group(1))")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "App-Version: $V"

      - name: Icon erstellen (PNG → ICNS)
        run: |
          mkdir -p /tmp/AppIcon.iconset
          for SIZE in 16 32 128 256 512; do
            sips -z $SIZE $SIZE static/logo.png \
              --out /tmp/AppIcon.iconset/icon_${SIZE}x${SIZE}.png
            sips -z $((SIZE*2)) $((SIZE*2)) static/logo.png \
              --out /tmp/AppIcon.iconset/icon_${SIZE}x${SIZE}@2x.png
          done
          iconutil -c icns /tmp/AppIcon.iconset -o /tmp/AppIcon.icns

      - name: PyInstaller-Build
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name "Schiller-Klassen-Mixer-v${VERSION}" \
            --icon /tmp/AppIcon.icns \
            --add-data "static:static" \
            --add-data "app.py:." \
            --add-data "matcher.py:." \
            --add-data "update.py:." \
            --collect-data certifi \
            launcher.py

      - name: DMG erstellen
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Staging-Ordner: App + symbolischer Link auf /Applications
          # (in Finder als "Programme" sichtbar), damit Nutzer:innen die
          # App per Drag-and-Drop installieren koennen wie gewohnt.
          rm -rf dmg-stage
          mkdir -p dmg-stage
          cp -R "dist/Schiller-Klassen-Mixer-v${VERSION}.app" dmg-stage/
          ln -s /Applications dmg-stage/Programme
          hdiutil create \
            -volname "Schiller-Klassen-Mixer v${VERSION}" \
            -srcfolder dmg-stage \
            -ov -format UDZO \
            "Schiller-Klassen-Mixer-v${VERSION}.dmg"

      - name: DMG hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Schiller-Klassen-Mixer-macOS-v${{ steps.ver.outputs.version }}
          path: Schiller-Klassen-Mixer-v${{ steps.ver.outputs.version }}.dmg
          retention-days: 90

  # ── Windows: Single-File EXE ────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install flask pyinstaller pillow certifi

      - name: App-Version auslesen
        id: ver
        shell: pwsh
        run: |
          $content = Get-Content app.py -Raw
          $m = [regex]::Match($content, 'APP_VERSION\s*=\s*"([^"]+)"')
          $v = $m.Groups[1].Value
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "App-Version: $v"

      - name: Icon erstellen (PNG → ICO)
        run: |
          python -c "
          from PIL import Image
          img = Image.open('static/logo.png')
          img.save('static/logo.ico', format='ICO',
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: PyInstaller-Build (Onefile, alles in einer EXE)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "Schiller-Klassen-Mixer-v$env:VERSION" `
            --icon "static\logo.ico" `
            --add-data "static;static" `
            --add-data "app.py;." `
            --add-data "matcher.py;." `
            --add-data "update.py;." `
            --collect-data certifi `
            launcher.py

      - name: EXE hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Schiller-Klassen-Mixer-Windows-v${{ steps.ver.outputs.version }}
          path: dist/Schiller-Klassen-Mixer-v${{ steps.ver.outputs.version }}.exe
          retention-days: 90

  # ── Publish: version.json + Binaries auf die Schul-Homepage (nur bei Tag) ──
  # Nur build-windows ist Pflicht — macOS-Runner stehen oft lange in der Queue
  # und sollen den Auto-Update-Deploy nicht aufhalten. Wenn DMG vorhanden ist
  # wird sie mit-hochgeladen, sonst bleibt der Mac-URL-Eintrag in version.json
  # auf einen kuenftigen Build verweisen.
  publish:
    # build-windows ist Pflicht (EXE muss da sein); build-macos wird abgewartet
    # damit die DMG nicht in einer Race-Condition fehlt — wenn macOS-Build
    # ausfaellt, laeuft publish trotzdem mit einer Warning weiter (DMG-Step
    # ist optional, siehe Upload-Logik unten).
    needs: [build-windows, build-macos]
    if: |
      always() &&
      needs.build-windows.result == 'success' &&
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Version aus Tag ableiten
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: version.json erzeugen
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # `www.`-Subdomain ist Pflicht: Mittwald macht sonst 301-Downgrade
          # von HTTPS apex auf HTTP www, was Python's urllib im
          # PyInstaller-Bundle nicht folgt -> Auto-Update findet "kein
          # Update". Browser-Pfade tolerieren den Redirect.
          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "win_url": "https://www.schiller-offenburg.de/classmatcher/Schiller-Klassen-Mixer-v${VERSION}.exe",
            "mac_url": "https://www.schiller-offenburg.de/classmatcher/Schiller-Klassen-Mixer-v${VERSION}.dmg",
            "notes": ""
          }
          EOF
          cat version.json

      - name: Upload zur Homepage (Binaries zuerst, version.json zuletzt)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          EXE=$(find artifacts -name '*.exe' | head -1)
          DMG=$(find artifacts -name '*.dmg' | head -1)
          if [ -z "$EXE" ]; then
            echo "::error::EXE nicht in den Artefakten gefunden"; exit 1
          fi
          if [ -z "$DMG" ]; then
            echo "::warning::DMG fehlt — nur EXE + version.json werden hochgeladen"
          fi
          # Binaries zuerst, version.json zuletzt — Clients sehen nie eine
          # version.json, die auf noch-nicht-hochgeladene Dateien zeigt.
          UPLOAD_LIST=("$EXE")
          if [ -n "$DMG" ]; then
            UPLOAD_LIST+=("$DMG")
          fi
          UPLOAD_LIST+=("version.json")
          for f in "${UPLOAD_LIST[@]}"; do
            echo "Lade hoch: $f"
            curl --fail --silent --show-error --ftp-create-dirs \
                 --user "$FTP_USER:$FTP_PASS" \
                 --upload-file "$f" \
                 "ftp://$FTP_HOST/html/classmatcher/$(basename "$f")"
          done
          echo "Publish fertig: version.json $(grep -o '\"version\"[^,]*' version.json)"
