name: Build (macOS + Windows)

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

jobs:

  # ── macOS: DMG ──────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install flask pyinstaller pillow

      - name: App-Version auslesen
        id: ver
        run: |
          V=$(python -c "import re; print(re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"', open('app.py').read()).group(1))")
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "App-Version: $V"

      - name: Icon erstellen (PNG → ICNS)
        run: |
          mkdir -p /tmp/AppIcon.iconset
          for SIZE in 16 32 128 256 512; do
            sips -z $SIZE $SIZE static/logo.png \
              --out /tmp/AppIcon.iconset/icon_${SIZE}x${SIZE}.png
            sips -z $((SIZE*2)) $((SIZE*2)) static/logo.png \
              --out /tmp/AppIcon.iconset/icon_${SIZE}x${SIZE}@2x.png
          done
          iconutil -c icns /tmp/AppIcon.iconset -o /tmp/AppIcon.icns

      - name: PyInstaller-Build
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name "Schiller-Klassen-Mixer-v${VERSION}" \
            --icon /tmp/AppIcon.icns \
            --add-data "static:static" \
            --add-data "app.py:." \
            --add-data "matcher.py:." \
            launcher.py

      - name: DMG erstellen
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          hdiutil create \
            -volname "Schiller-Klassen-Mixer v${VERSION}" \
            -srcfolder "dist/Schiller-Klassen-Mixer-v${VERSION}.app" \
            -ov -format UDZO \
            "Schiller-Klassen-Mixer-v${VERSION}.dmg"

      - name: DMG hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Schiller-Klassen-Mixer-macOS-v${{ steps.ver.outputs.version }}
          path: Schiller-Klassen-Mixer-v${{ steps.ver.outputs.version }}.dmg
          retention-days: 90

  # ── Windows: Single-File EXE ────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install flask pyinstaller pillow

      - name: App-Version auslesen
        id: ver
        shell: pwsh
        run: |
          $content = Get-Content app.py -Raw
          $m = [regex]::Match($content, 'APP_VERSION\s*=\s*"([^"]+)"')
          $v = $m.Groups[1].Value
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "App-Version: $v"

      - name: Icon erstellen (PNG → ICO)
        run: |
          python -c "
          from PIL import Image
          img = Image.open('static/logo.png')
          img.save('static/logo.ico', format='ICO',
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: PyInstaller-Build (Onefile, alles in einer EXE)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "Schiller-Klassen-Mixer-v$env:VERSION" `
            --icon "static\logo.ico" `
            --add-data "static;static" `
            --add-data "app.py;." `
            --add-data "matcher.py;." `
            launcher.py

      - name: EXE hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Schiller-Klassen-Mixer-Windows-v${{ steps.ver.outputs.version }}
          path: dist/Schiller-Klassen-Mixer-v${{ steps.ver.outputs.version }}.exe
          retention-days: 90

  # ── Publish: version.json + Binaries auf die Schul-Homepage (nur bei Tag) ──
  publish:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Version aus Tag ableiten
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: version.json erzeugen
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "win_url": "https://schiller-offenburg.de/classmatcher/Schiller-Klassen-Mixer-v${VERSION}.exe",
            "mac_url": "https://schiller-offenburg.de/classmatcher/Schiller-Klassen-Mixer-v${VERSION}.dmg",
            "notes": ""
          }
          EOF
          cat version.json

      - name: Upload zur Homepage (Binaries zuerst, version.json zuletzt)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          EXE=$(find artifacts -name '*.exe' | head -1)
          DMG=$(find artifacts -name '*.dmg' | head -1)
          if [ -z "$EXE" ] || [ -z "$DMG" ]; then
            echo "::error::EXE oder DMG nicht in den Artefakten gefunden"; exit 1
          fi
          for f in "$EXE" "$DMG" version.json; do
            echo "Lade hoch: $f"
            curl --fail --silent --show-error --ftp-create-dirs \
                 --user "$FTP_USER:$FTP_PASS" \
                 --upload-file "$f" \
                 "ftp://$FTP_HOST/classmatcher/$(basename "$f")"
          done
          echo "Publish fertig: version.json $(grep -o '\"version\"[^,]*' version.json)"
