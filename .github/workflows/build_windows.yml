name: Windows Build

on:
  workflow_dispatch:   # manuell per Knopfdruck auf GitHub auslösen

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install flask pyinstaller pillow

      - name: Icon konvertieren (PNG → ICO)
        run: |
          python -c "
          from PIL import Image
          img = Image.open('static/logo.png')
          img.save('static/logo.ico', format='ICO',
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: PyInstaller-Build
        run: |
          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "Schiller-Klassen-Mixer" `
            --icon "static\logo.ico" `
            --add-data "static;static" `
            --add-data "app.py;." `
            --add-data "matcher.py;." `
            launcher.py

      - name: ZIP erstellen
        run: |
          Compress-Archive `
            -Path "dist\Schiller-Klassen-Mixer" `
            -DestinationPath "Schiller-Klassen-Mixer-Windows.zip"

      - name: ZIP hochladen (Download-Artefakt)
        uses: actions/upload-artifact@v4
        with:
          name: Schiller-Klassen-Mixer-Windows
          path: Schiller-Klassen-Mixer-Windows.zip
          retention-days: 30
